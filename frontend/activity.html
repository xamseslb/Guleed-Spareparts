<body>

    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Inventory</div>
      <a href="parts.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="7" height="9"/><rect x="15" y="3" width="7" height="5"/><rect x="15" y="12" width="7" height="9"/><rect x="2" y="16" width="7" height="5"/></svg>
        Parts
      </a>
      <a href="orders.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Orders
      </a>
      <a href="customers.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Customers
      </a>
      <a href="loans.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>
        Loans
      </a>
      <div class="nav-section-label" style="margin-top:8px;">Analytics</div>
      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Dashboard
      </a>
      <a href="sales.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        Sales
      </a>
      <div class="nav-section-label" style="margin-top:8px;">Administration</div>
      <a href="users.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Users
      </a>
      <a href="activity.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
        Activity
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="user-info-wrap"><strong id="sidebar-username">…</strong><span id="sidebar-role"></span></div>
      </div>
      <button class="logout-btn" id="logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <h1 class="topbar-title">Activity log</h1>
      <div class="topbar-actions">
        <label class="filter-toggle" style="margin-right:8px;">
          <input type="checkbox" id="deletions-only"> Deletions only
        </label>
        <button class="btn btn-secondary" id="refresh-btn">Refresh</button>
      </div>
    </header>

    <div class="page-body">
      <p style="font-size:12.5px;color:var(--text-muted);margin-bottom:10px;">
        Every change (create, edit, delete) is recorded here with who did it and when.
      </p>
      <div class="table-wrap">
        <table class="data-table" aria-label="Activity">
          <thead>
            <tr>
              <th>When</th>
              <th>User</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="activity-table-body">
            <tr><td colspan="3" style="text-align:center;padding:48px;"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
      <div class="table-footer">
        <span id="record-count" class="record-count">–</span>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script type="module">
import { api } from './js/api.js';

const token = localStorage.getItem('gs_token');
if (!token) window.location.href = 'login.html';
const user = JSON.parse(localStorage.getItem('gs_user') || '{}');
if (user.role !== 'admin') window.location.href = 'index.html';

const fullName = user.full_name || 'Admin';
document.getElementById('sidebar-username').textContent = fullName;
document.getElementById('sidebar-role').textContent = user.role || '';
document.getElementById('user-avatar').textContent = fullName.charAt(0).toUpperCase();
document.getElementById('logout-btn').addEventListener('click', () => { localStorage.clear(); window.location.href = 'login.html'; });

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function fmtTime(s) {
  if (!s) return '–';
  const d = new Date(s);
  return d.toLocaleDateString('no-NO') + ' ' + d.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
}

// Turn "DELETE /api/orders/5" into "Deleted order #5"
// A POST to /bulk-delete is really a deletion, even though the method is POST.
function isDeletion(r) {
  return r.method === 'DELETE' || /bulk-delete/.test(r.path);
}

// Turn "DELETE /api/orders/5" into "Deleted order #5", appending the saved
// detail (e.g. the part number) when we have it.
function describe(r) {
  const method = r.method, path = r.path;
  const p = path.replace(/^\/api\//, '').replace(/\/$/, '');
  const seg = p.split('/');
  const withDetail = (text) => r.detail ? `${text} — ${r.detail}` : text;
  if (/bulk-delete/.test(path)) return withDetail('Deleted parts');
  if (seg[0] === 'loans' && seg[2] === 'return') return `Marked credit sale #${seg[1]} as paid`;
  if (seg[0] === 'auth' && seg[1] === 'register') return 'Created a user';
  if (seg[0] === 'auth' && seg[1] === 'users') return `Updated user #${seg[2] || ''}`;
  if (seg[0] === 'parts' && seg[2] === 'images') return `${method === 'DELETE' ? 'Removed' : 'Added'} an image on part #${seg[1]}`;
  const names = { orders: 'order', parts: 'part', customers: 'customer', loans: 'credit sale' };
  const entity = names[seg[0]] || seg[0];
  const hasId = seg[1] && /^\d+$/.test(seg[1]);
  if (method === 'POST' && !hasId) return `Created a ${entity}`;
  const verb = method === 'DELETE' ? 'Deleted' : method === 'POST' ? 'Created' : 'Updated';
  const base = `${verb} ${entity}${hasId ? ' #' + seg[1] : ''}`;
  return (method === 'DELETE') ? withDetail(base) : base;
}

function actionBadge(r) {
  if (isDeletion(r)) return `<span class="badge badge-empty">Delete</span>`;
  const cls = { POST: 'badge-ok', PUT: 'badge-category', PATCH: 'badge-category' }[r.method] || 'badge-category';
  const label = { POST: 'Create', PUT: 'Update', PATCH: 'Update' }[r.method] || r.method;
  return `<span class="badge ${cls}">${label}</span>`;
}

let allEvents = [];

function render() {
  const tbody = document.getElementById('activity-table-body');
  const deletionsOnly = document.getElementById('deletions-only').checked;
  const rows = deletionsOnly ? allEvents.filter(isDeletion) : allEvents;
  document.getElementById('record-count').textContent =
    `${rows.length} event${rows.length === 1 ? '' : 's'}${deletionsOnly ? ' (deletions)' : ''}`;
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="3"><div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
      <h3>${deletionsOnly ? 'No deletions yet' : 'No activity yet'}</h3><p>Changes will appear here as they happen.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td style="color:var(--text-secondary);white-space:nowrap;">${fmtTime(r.timestamp)}</td>
      <td><span class="cell-name">${r.username || 'unknown'}</span></td>
      <td>${actionBadge(r)} <span style="margin-left:6px;">${describe(r)}</span></td>
    </tr>`).join('');
}

async function load() {
  try {
    allEvents = await api.getActivity() || [];
    render();
  } catch (err) {
    toast('Failed to load activity: ' + err.message, 'error');
  }
}

document.getElementById('refresh-btn').addEventListener('click', load);
document.getElementById('deletions-only').addEventListener('change', render);
load();
</script>
</body>
</html>
