<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – Guuleed Spareparts</title>
  <meta name="description" content="Staff login for Guuleed Spareparts inventory management">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="icons/favicon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#21303f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Guuleed">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
<div id="app-loading" aria-hidden="true">
  <img src="icons/icon-192.png" alt="">
  <div class="al-text">Loading Guuleed Spareparts…</div>
  <div class="al-spin"></div>
</div>
<style>
#app-loading{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#21303f;opacity:0;pointer-events:none;transition:opacity .2s}
#app-loading.show{opacity:1;pointer-events:auto}
#app-loading img{width:60px;height:60px;border-radius:14px}
#app-loading .al-text{color:#cbd2dd;font:500 14px system-ui,Segoe UI,Roboto,Arial,sans-serif}
#app-loading .al-spin{width:24px;height:24px;border:3px solid rgba(255,255,255,.22);border-top-color:#e67e22;border-radius:50%;animation:alspin .8s linear infinite}
@keyframes alspin{to{transform:rotate(360deg)}}
</style>
<script>
(function(){var t=setTimeout(function(){var l=document.getElementById('app-loading');if(l)l.classList.add('show')},350);
function hide(){clearTimeout(t);var l=document.getElementById('app-loading');if(l){l.classList.remove('show');setTimeout(function(){if(l&&l.parentNode)l.parentNode.removeChild(l)},220)}}
document.addEventListener('DOMContentLoaded',hide);window.addEventListener('load',hide);setTimeout(hide,12000)})();
</script>
<!-- The logo is the page background (CSS); the form floats on top. -->
<div class="login-page">

  <div class="login-card">

      <img src="img/logo.png" class="login-card-logo" alt="Guuleed Spareparts">

      <h1 class="login-heading">Sign in to your account</h1>
      <p class="login-sub">Enter your credentials to access the inventory system.</p>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input id="username" type="text" class="form-input" placeholder="Enter username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" class="form-input" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <div id="login-error" class="login-error"></div>
        <button type="submit" class="btn btn-primary login-btn" id="login-btn">Sign in</button>
      </form>

  </div>

</div>

<script type="module">
  import { api } from './js/api.js';

  if (localStorage.getItem('gs_token')) {
    window.location.href = 'index.html';
  }

  const form   = document.getElementById('login-form');
  const errEl  = document.getElementById('login-error');
  const btn    = document.getElementById('login-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { showErr('Please enter your credentials.'); return; }

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errEl.classList.remove('visible');

    try {
      const data = await api.login(username, password);
      localStorage.setItem('gs_token', data.access_token);
      localStorage.setItem('gs_user', JSON.stringify({ full_name: data.full_name, role: data.role }));
      window.location.href = 'index.html';
    } catch (err) {
      showErr(err.message || 'Invalid credentials');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });

  function showErr(msg) {
    errEl.textContent = msg;
    errEl.classList.add('visible');
  }
</script>
</body>
</html>
