<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – Guuleed Spareparts</title>
  <meta name="description" content="Staff login for Guuleed Spareparts inventory management">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="icons/favicon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#21303f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Guuleed">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
<div class="login-page">

  <!-- Left: branded hero with the logo -->
  <div class="login-hero">
    <div class="login-hero-inner">
      <img src="img/logo.png" class="login-hero-logo" alt="Guuleed Spareparts">
      <p class="login-hero-tag">Inventory, orders and sales — built for your spare parts business.</p>
    </div>
  </div>

  <!-- Right: sign-in form -->
  <div class="login-left">
    <div class="login-card">

      <img src="img/logo.png" class="login-card-logo" alt="Guuleed Spareparts">

      <h1 class="login-heading">Sign in to your account</h1>
      <p class="login-sub">Enter your credentials to access the inventory system.</p>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input id="username" type="text" class="form-input" placeholder="Enter username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" class="form-input" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <div id="login-error" class="login-error"></div>
        <button type="submit" class="btn btn-primary login-btn" id="login-btn">Sign in</button>
      </form>

    </div>
  </div>

</div>

<script type="module">
  import { api } from './js/api.js';

  if (localStorage.getItem('gs_token')) {
    window.location.href = 'index.html';
  }

  const form   = document.getElementById('login-form');
  const errEl  = document.getElementById('login-error');
  const btn    = document.getElementById('login-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { showErr('Please enter your credentials.'); return; }

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errEl.classList.remove('visible');

    try {
      const data = await api.login(username, password);
      localStorage.setItem('gs_token', data.access_token);
      localStorage.setItem('gs_user', JSON.stringify({ full_name: data.full_name, role: data.role }));
      window.location.href = 'index.html';
    } catch (err) {
      showErr(err.message || 'Invalid credentials');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });

  function showErr(msg) {
    errEl.textContent = msg;
    errEl.classList.add('visible');
  }
</script>
</body>
</html>
