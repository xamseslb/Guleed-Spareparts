<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales – Guuleed Spareparts</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="icons/favicon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#21303f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Guuleed">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    .period-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .period-btn {
      padding: 7px 14px; font-size: 13px; font-weight: 500;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--surface); color: var(--text-secondary); cursor: pointer;
    }
    .period-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .sales-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
    .top-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .top-table th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); text-align: left; padding: 0 0 10px; }
    .top-table td { padding: 9px 0; border-bottom: 1px solid #f2f3f5; }
    .top-table tr:last-child td { border-bottom: none; }
    .top-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .top-table th.num { text-align: right; }
  </style>
</head>
<body>
<div id="app-loading" aria-hidden="true">
  <img src="icons/icon-192.png" alt="">
  <div class="al-text">Loading Guuleed Spareparts…</div>
  <div class="al-spin"></div>
</div>
<style>
#app-loading{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#21303f;opacity:0;pointer-events:none;transition:opacity .2s}
#app-loading.show{opacity:1;pointer-events:auto}
#app-loading img{width:60px;height:60px;border-radius:14px}
#app-loading .al-text{color:#cbd2dd;font:500 14px system-ui,Segoe UI,Roboto,Arial,sans-serif}
#app-loading .al-spin{width:24px;height:24px;border:3px solid rgba(255,255,255,.22);border-top-color:#e67e22;border-radius:50%;animation:alspin .8s linear infinite}
@keyframes alspin{to{transform:rotate(360deg)}}
</style>
<script>
(function(){var t=setTimeout(function(){var l=document.getElementById('app-loading');if(l)l.classList.add('show')},350);
function hide(){clearTimeout(t);var l=document.getElementById('app-loading');if(l){l.classList.remove('show');setTimeout(function(){if(l&&l.parentNode)l.parentNode.removeChild(l)},220)}}
document.addEventListener('DOMContentLoaded',hide);window.addEventListener('load',hide);setTimeout(hide,12000)})();
</script>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"><img src="icons/icon-192.png" alt="Guuleed Spareparts logo"></div>
      <div class="logo-text-wrap"><strong>Guuleed</strong><span>Spareparts</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Inventory</div>
      <a href="parts.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="7" height="9"/><rect x="15" y="3" width="7" height="5"/><rect x="15" y="12" width="7" height="9"/><rect x="2" y="16" width="7" height="5"/></svg>
        Parts
      </a>
      <a href="orders.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Orders
      </a>
      <a href="customers.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Customers
      </a>
      <a href="loans.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>
        Loans
      </a>
      <div class="nav-section-label" style="margin-top:8px;">Analytics</div>
      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Dashboard
      </a>
      <a href="sales.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        Sales
      </a>
      <div class="nav-section-label admin-only" style="margin-top:8px;display:none;">Administration</div>
      <a href="users.html" class="nav-item admin-only" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Users
      </a>
      <a href="activity.html" class="nav-item admin-only" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
        Activity
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="user-info-wrap"><strong id="sidebar-username">…</strong><span id="sidebar-role"></span></div>
      </div>
      <button class="logout-btn" id="logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <h1 class="topbar-title">Sales</h1>
    </header>

    <div class="page-body">
      <div class="period-bar" id="period-bar">
        <button class="period-btn" data-period="today">Today</button>
        <button class="period-btn" data-period="week">This week</button>
        <button class="period-btn active" data-period="month">This month</button>
        <button class="period-btn" data-period="all">All time</button>
      </div>

      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);">
        <div class="stat-card"><div class="stat-label">Items Sold</div><div class="stat-value" id="kpi-units">–</div></div>
        <div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-value" id="kpi-revenue" style="font-size:19px;letter-spacing:-.3px;">–</div></div>
        <div class="stat-card"><div class="stat-label">Sales (lines)</div><div class="stat-value" id="kpi-tx">–</div></div>
      </div>

      <div class="sales-card" style="margin-top:20px;">
        <div style="font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:4px;">Best sellers</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px;">Top parts by revenue in this period</div>
        <table class="top-table">
          <thead>
            <tr><th>Part No.</th><th>Name</th><th class="num">Units</th><th class="num">Revenue</th></tr>
          </thead>
          <tbody id="top-body">
            <tr><td colspan="4" style="text-align:center;padding:32px;"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container" aria-live="polite"></div>

<script type="module">
import { api } from './js/api.js';

const token = localStorage.getItem('gs_token');
if (!token) window.location.href = 'login.html';

const user = JSON.parse(localStorage.getItem('gs_user') || '{}');
const fullName = user.full_name || 'Employee';
document.getElementById('sidebar-username').textContent = fullName;
document.getElementById('sidebar-role').textContent = user.role || '';
document.getElementById('user-avatar').textContent = fullName.charAt(0).toUpperCase();
document.getElementById('logout-btn').addEventListener('click', () => { localStorage.clear(); window.location.href = 'login.html'; });
try { if (user.role === 'admin') document.querySelectorAll('.admin-only').forEach(e => e.style.display = ''); } catch (e) {}

const money = v => '$' + Number(v || 0).toLocaleString('en-US');

async function loadSales(period) {
  try {
    const s = await api.getSales(period);
    document.getElementById('kpi-units').textContent = (s.total_units || 0).toLocaleString('en-US');
    document.getElementById('kpi-revenue').textContent = money(s.total_revenue);
    document.getElementById('kpi-tx').textContent = (s.transactions || 0).toLocaleString('en-US');

    const body = document.getElementById('top-body');
    const rows = s.top_parts || [];
    if (!rows.length) {
      body.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:28px;color:var(--text-muted);">No sales in this period yet.</td></tr>`;
      return;
    }
    body.innerHTML = rows.map(p => `
      <tr>
        <td style="color:var(--link);font-weight:600;white-space:nowrap;">${p.part_number || '–'}</td>
        <td>${p.name || ''}</td>
        <td class="num">${(p.units || 0).toLocaleString('en-US')}</td>
        <td class="num">${money(p.revenue)}</td>
      </tr>`).join('');
  } catch (err) {
    if (window.toast) toast('Could not load sales: ' + err.message, 'error');
  }
}

document.getElementById('period-bar').addEventListener('click', (e) => {
  const btn = e.target.closest('.period-btn');
  if (!btn) return;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadSales(btn.dataset.period);
});

loadSales('month');
</script>
</body>
</html>
