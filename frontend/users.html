<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users – Guleed Spareparts</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <div class="logo-text-wrap"><strong>Guleed</strong><span>Spareparts</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Inventory</div>
      <a href="parts.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="7" height="9"/><rect x="15" y="3" width="7" height="5"/><rect x="15" y="12" width="7" height="9"/><rect x="2" y="16" width="7" height="5"/></svg>
        Parts
      </a>
      <a href="orders.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Orders
      </a>
      <a href="customers.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Customers
      </a>
      <a href="loans.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>
        Loans
      </a>
      <div class="nav-section-label" style="margin-top:8px;">Analytics</div>
      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Dashboard
      </a>
      <div class="nav-section-label" style="margin-top:8px;">Administration</div>
      <a href="users.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Users
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="user-info-wrap"><strong id="sidebar-username">…</strong><span id="sidebar-role"></span></div>
      </div>
      <button class="logout-btn" id="logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <h1 class="topbar-title">Users</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="add-user-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add employee
        </button>
      </div>
    </header>

    <div class="page-body">
      <div class="table-wrap">
        <table class="data-table" aria-label="Users">
          <thead>
            <tr>
              <th>Employee no. / username</th>
              <th>Name</th>
              <th>Role</th>
              <th>Status</th>
              <th>Last login</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="users-table-body">
            <tr><td colspan="6" style="text-align:center;padding:48px;"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>

      <div class="table-footer">
        <span id="record-count" class="record-count">–</span>
      </div>
    </div>
  </div>
</div>

<!-- Add employee modal -->
<div class="modal-overlay" id="user-modal" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header">
      <h2 id="modal-title">Add employee</h2>
      <button class="btn-icon" id="modal-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="user-form" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="f-username">Employee no. / username *</label>
            <input id="f-username" class="form-input" required placeholder="100724" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-fullname">Full name *</label>
            <input id="f-fullname" class="form-input" required placeholder="Ola Nordmann">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-password">Password *</label>
            <input id="f-password" type="text" class="form-input" required placeholder="At least 6 characters">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-role">Role</label>
            <select id="f-role" class="form-select">
              <option value="ansatt">Employee (ansatt)</option>
              <option value="leser">Read-only (leser)</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-save">Create employee</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script type="module">
import { api } from './js/api.js';

const token = localStorage.getItem('gs_token');
if (!token) window.location.href = 'login.html';

const user = JSON.parse(localStorage.getItem('gs_user') || '{}');
// Only admins may manage users
if (user.role !== 'admin') window.location.href = 'index.html';

const fullName = user.full_name || 'Admin';
document.getElementById('sidebar-username').textContent = fullName;
document.getElementById('sidebar-role').textContent = user.role || '';
document.getElementById('user-avatar').textContent = fullName.charAt(0).toUpperCase();
document.getElementById('logout-btn').addEventListener('click', () => { localStorage.clear(); window.location.href = 'login.html'; });

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function fmtDate(s) {
  if (!s) return 'Never';
  const d = new Date(s);
  return d.toLocaleDateString('no-NO') + ' ' + d.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
}

function roleBadge(role) {
  const cls = { admin: 'badge-category', ansatt: 'badge-ok', leser: 'badge-low' }[role] || 'badge-ok';
  return `<span class="badge ${cls}">${role}</span>`;
}

async function loadUsers() {
  try {
    const users = await api.getUsers(true) || [];
    renderTable(users);
  } catch (err) {
    toast('Failed to load users: ' + err.message, 'error');
  }
}

function renderTable(users) {
  const tbody = document.getElementById('users-table-body');
  document.getElementById('record-count').textContent = `${users.length} user${users.length === 1 ? '' : 's'} listed`;
  if (!users.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <h3>No users yet</h3><p>Add your first employee above.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr style="${u.is_active ? '' : 'opacity:.55;'}">
      <td class="cell-part-number">${u.username}</td>
      <td class="cell-name">${u.full_name}</td>
      <td>${roleBadge(u.role)}</td>
      <td>${u.is_active
        ? '<span class="badge badge-ok">Active</span>'
        : '<span class="badge badge-empty">Disabled</span>'}</td>
      <td style="color:var(--text-secondary);">${fmtDate(u.last_login)}</td>
      <td>
        <div class="cell-actions">
          ${u.is_active
            ? `<button class="btn btn-secondary" style="padding:5px 10px;font-size:12px;" onclick="setActive(${u.id}, false, '${u.username}')">Disable</button>`
            : `<button class="btn btn-secondary" style="padding:5px 10px;font-size:12px;" onclick="setActive(${u.id}, true, '${u.username}')">Enable</button>`}
        </div>
      </td>
    </tr>`).join('');
}

window.setActive = async (id, active, username) => {
  const verb = active ? 'enable' : 'disable';
  if (!confirm(`Are you sure you want to ${verb} ${username}?`)) return;
  try {
    await api.updateUser(id, { is_active: active });
    toast(`User ${active ? 'enabled' : 'disabled'}`, 'success');
    loadUsers();
  } catch (err) { toast(err.message, 'error'); }
};

// ── Modal ──
const modal = document.getElementById('user-modal');
function openModal() { modal.classList.add('open'); }
function closeModal() { modal.classList.remove('open'); document.getElementById('user-form').reset(); }
document.getElementById('add-user-btn').addEventListener('click', openModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

document.getElementById('modal-save').addEventListener('click', async () => {
  const username = document.getElementById('f-username').value.trim();
  const full_name = document.getElementById('f-fullname').value.trim();
  const password = document.getElementById('f-password').value;
  const role = document.getElementById('f-role').value;
  if (!username || !full_name || !password) { toast('Please fill in all required fields', 'error'); return; }
  if (password.length < 6) { toast('Password must be at least 6 characters', 'error'); return; }
  try {
    await api.createUser({ username, full_name, password, role });
    toast(`Employee '${username}' created`, 'success');
    closeModal();
    loadUsers();
  } catch (err) { toast(err.message, 'error'); }
});

loadUsers();
</script>
</body>
</html>
