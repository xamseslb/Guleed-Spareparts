# Render Blueprint – deploys the FastAPI app. The database is hosted on
# Supabase: paste its "Session pooler" connection string into DATABASE_URL
# in the Render dashboard (it is a secret, not stored in this file).
# In the Render dashboard: New → Blueprint → pick this repo. Render reads this file.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: guuleed-spareparts
    runtime: python
    plan: free
    region: frankfurt            # closest to Norway
    # Install backend dependencies (requirements live under backend/)
    buildCommand: pip install -r backend/requirements.txt
    # Apply DB migrations, then start the server on Render's $PORT
    startCommand: alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true       # Render generates a secure random secret
      - key: ALLOWED_ORIGINS
        value: https://guuleedspareparts.com,https://www.guuleedspareparts.com
      - key: SEED_ON_STARTUP
        value: "false"            # don't auto-insert demo data in production
      - key: ADMIN_USERNAME
        value: admin              # first admin login (created on first boot)
      - key: ADMIN_PASSWORD
        sync: false               # set this yourself in the Render dashboard (secret)
      - key: DATABASE_URL
        sync: false               # paste your Supabase "Session pooler" string here
                                  # e.g. postgresql://postgres.<ref>:<pwd>@aws-0-eu-central-1.pooler.supabase.com:5432/postgres
